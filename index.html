<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-Commerce Store</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

input,select{
padding:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button{
padding:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

.cart{
position:fixed;
top:10px;
right:20px;
background:white;
padding:10px;
border-radius:8px;
}

@media(max-width:600px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<header>
<h1>Mini E-Commerce Store</h1>
</header>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<div class="controls">

<input type="text" id="search" placeholder="Search Products">

<select id="sort">
<option value="default">Sort</option>
<option value="low">Price Low-High</option>
<option value="high">Price High-Low</option>
</select>

</div>

<div class="container" id="products"></div>

<script>

const products = [

{name:"Laptop",price:50000},
{name:"Headphones",price:2000},
{name:"Mobile",price:25000},
{name:"Shoes",price:1500},
{name:"Book",price:600},
{name:"Watch",price:3000}

];

let cart = 0;

const productDiv =
document.getElementById("products");

function showProducts(data){

productDiv.innerHTML="";

data.forEach(item=>{

productDiv.innerHTML += `

<div class="card">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

<button onclick="addCart()">
Add To Cart
</button>

</div>

`;

});

}

function addCart(){

cart++;

document.getElementById(
"cartCount"
).innerText = cart;

}

document.getElementById(
"search"
).addEventListener("input",filterData);

document.getElementById(
"sort"
).addEventListener("change",filterData);

function filterData(){

let filtered = [...products];

const text =
document.getElementById(
"search"
).value.toLowerCase();

filtered = filtered.filter(
p => p.name.toLowerCase().includes(text)
);

const sort =
document.getElementById(
"sort"
).value;

if(sort==="low"){
filtered.sort(
(a,b)=>a.price-b.price
);
}

if(sort==="high"){
filtered.sort(
(a,b)=>b.price-a.price
);
}

showProducts(filtered);

}

showProducts(products);

</script>

</body>
</html>
